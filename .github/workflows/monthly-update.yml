name: Monthly Market Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 1 * *"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run tests
        run: pytest -v

      - name: Generate latest snapshot
        run: python -m market_phase_detector.cli

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: market-phase-dashboard
          path: dist
