                  - generic [ref=e80]: US Credit Spread = Merrill Lynch High-Yield Bond Yield ŌĆō US 10-Year Bond Yield (risk-free interest rate). This spread reflects the market's expectations of future corporate default risk. High-yield bonds are issued by companies with lower credit ratings (below BBB). Due to the higher credit risk associated with these bonds, their yield spread tends to be greater than that of investment-grade bonds. Credit risk spreads have an inverse relationship with the stock market. When companies are performing well, future cash flow growth increases, and default risk decreases (lower credit risk), leading to a narrower spread and a rising stock market. Conversely, during risk events that heighten corporate default risk (higher credit risk), the spread widens, and the stock market tends to decline.
