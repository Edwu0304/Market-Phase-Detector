<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market Phase Detector</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="page">
    <header class="hero">
      <p class="eyebrow">Monthly Cycle Dashboard</p>
      <h1>Market Phase Detector</h1>
      <p class="subtitle">Taiwan and US cycle positioning with conservative phase transitions.</p>
    </header>
    <section id="status" class="status-bar"></section>
    <section class="timeline-panel">
      <div class="timeline-header">
        <h2>Timeline</h2>
        <p>Monthly history written to <code>data/history</code>.</p>
      </div>
      <div id="timeline" class="timeline"></div>
    </section>
    <section id="summary" class="cards"></section>
  </main>
  <script src="./app.js"></script>
</body>
</html>
